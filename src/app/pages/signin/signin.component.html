<app-main>
  <div class="relative flex items-center justify-center min-h-screen bg-[#f8fafc] overflow-hidden px-4">

    <div
      class="absolute top-1/4 -left-20 w-72 h-72 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob">

    <div
      class="absolute top-1/3 -right-20 w-72 h-72 bg-cyan-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000">
    </div>

    <div
      class="relative w-full max-w-md h-150 flex flex-col justify-between p-10 bg-white/70 backdrop-blur-2xl rounded-[3rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)] border border-white/50">

      <div class="absolute -top-12 left-1/2 -translate-x-1/2 group mt-13">
        <div
          class="absolute inset-0 bg-linear-to-tr from-indigo-600 to-violet-500 rounded-3xl blur-2xl opacity-40 group-hover:opacity-100 group-hover:scale-125 transition-all duration-700 animate-pulse">
        </div>

        <div
          class="relative w-24 h-24 p-2 bg-white/30 rounded-[2.5rem] border border-white/60 backdrop-blur-md rotate-6 group-hover:rotate-0 transition-all duration-500 shadow-2xl">
          <div
            class="relative w-full h-full bg-linear-to-tr from-indigo-600 via-violet-500 to-purple-500 rounded-[1.8rem] shadow-xl flex items-center justify-center overflow-hidden">
            <div
              class="absolute inset-0 bg-linear-to-r from-transparent via-white/40 to-transparent -translate-x-full group-hover:animate-[shimmer_2s_infinite] skew-x-[-20deg]">
            </div>

            <svg
              class="w-12 h-12 text-white -rotate-6 group-hover:rotate-0 transition-transform duration-500 drop-shadow-md"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />

          <span class="absolute top-1 right-1 flex h-5 w-5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
            <span
              class="relative inline-flex rounded-full h-5 w-5 bg-indigo-500 border-[3px] border-white shadow-sm"></span>
          </span>
        </div>
      </div>

      <div class="mt-16 text-center">
        <h2 class="text-4xl font-black text-slate-900 tracking-tight leading-tight mb-4">
          Welcome <span class="text-transparent bg-clip-text bg-linear-to-r from-indigo-600 to-violet-600">Back</span>
        </h2>
        <p class="text-slate-500 font-medium leading-relaxed px-2">
          Unlock your developer dashboard and manage your portfolio projects.
        </p>
      </div>

      <div class="flex flex-col items-center gap-8">
        <div class="flex items-center w-full gap-4">
          <div class="h-px grow bg-linear-to-r from-transparent to-slate-200"></div>
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Quick Access</span>
          <div class="h-px grow bg-linear-to-l from-transparent to-slate-200"></div>
        </div>

        <div id="google-btn" class="min-h-12.5 transform transition-all active:scale-95">
        </div>

        <div class="h-px w-full bg-linear-to-r from-transparent via-slate-200 to-transparent"></div>
      </div>

      <div class="text-center">
        <div
          class="inline-flex items-center gap-3 px-5 py-2.5 bg-slate-50 border border-slate-100 rounded-2xl mb-6 group/badge hover:bg-white transition-colors duration-300">
          <div class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
          </div>
          <span class="text-[11px] font-bold text-slate-600 uppercase tracking-widest">End-to-End Encryption</span>
        </div>
      </div>

    </div>
