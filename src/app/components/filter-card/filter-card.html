<div class="w-full p-4">
  <div class="w-full bg-white rounded-xl shadow-md border border-gray-200">
    
    <div class="px-6 py-4 border-b border-gray-100">
      <h3 class="text-lg font-bold text-gray-800">{{ title }}</h3>
    </div>

    <form (ngSubmit)="applyFilter()">
      <div class="p-6">
        <div class="grid grid-cols-1 w-full" [style.gap.rem]="layout.gap * 0.25"
          [style.grid-template-columns]="'repeat(' + (fields.length > 0 ? layout.desktopCols : 1) + ', minmax(0, 1fr))'">

          @for (item of fields; track item.key) {
          <div class="w-full">

            @if (item.type === 'select') {
            <select [(ngModel)]="filterData[item.key]" [name]="item.key"
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-500">
              <option value="">{{ item.label }}</option>
              @for (opt of item.options; track opt) {
              <option [value]="opt">{{ opt }}</option>
              }
            </select>
            } @else {
            <input [type]="item.type" [(ngModel)]="filterData[item.key]" [name]="item.key" [placeholder]="item.label"
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-400">
            }

          </div>
          } @empty {
          <p class="text-gray-400 text-sm">No filters available.</p>
          }

        </div>
      </div>

      <div class="px-6 py-4 bg-gray-50 rounded-b-xl flex flex-col md:flex-row justify-start items-center gap-3">

        <button type="button" (click)="resetModel()"
          class="flex items-center justify-center w-full md:w-auto px-10 py-3 bg-red-700 hover:bg-red-800 text-white font-bold rounded-lg transition-all shadow-lg active:scale-95 shadow-gray-200 text-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Reset Filters
        </button>

        <button type="submit"
          class="flex items-center justify-center w-full md:w-auto px-10 py-3 bg-gray-900 hover:bg-black text-white font-bold rounded-lg transition-all shadow-lg active:scale-95 shadow-gray-200 text-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
          </svg>
          Filter
        </button>

      </div>
    </form>
  </div>
</div>
