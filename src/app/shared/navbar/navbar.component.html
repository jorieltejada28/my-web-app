<nav class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/80 backdrop-blur-md">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">

      <div class="flex shrink-0 items-center">
        <a href="#" class="text-xl font-bold tracking-tight text-gray-900">
          {{ name }}<span class="text-blue-600">.</span>
        </a>
      </div>

      <div class="hidden md:block">
        <div class="ml-10 flex items-baseline space-x-8">
          @for (link of navLinks; track link.label) {
          <a [routerLink]="link.path" routerLinkActive="text-gray-900" [routerLinkActiveOptions]="{ exact: true }"
            class="text-sm font-medium text-gray-900 hover:text-blue-600 transition-colors">
            {{ link.label}}
          </a>
          }
        </div>
      </div>

      <div class="flex md:hidden">
        <label for="mobile-menu-toggle"
          class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-500 cursor-pointer">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </label>
      </div>
    </div>
  </div>

  <input type="checkbox" id="mobile-menu-toggle" class="peer hidden" />
  <div class="hidden peer-checked:block md:hidden bg-white border-b border-gray-200">
    <div class="space-y-1 px-2 pb-3 pt-2 sm:px-3">
      @for (link of navLinks; track link.label) {
      <a [routerLink]="link.path" 
         routerLinkActive="bg-gray-50 text-blue-600" 
         [routerLinkActiveOptions]="{exact: true}"
         class="block rounded-md px-3 py-2 text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-blue-600 transition-colors">
        {{ link.label }}
      </a>
      }
    </div>
  </div>
</nav>
